services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.production
    restart: unless-stopped
    volumes:
      - benchmark-data:/data
    networks:
      - benchmark-internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${BACKEND_URL}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - benchmark-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - benchmark-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3

  tigergraph:
    image: tigergraph/tigergraph:latest
    profiles: ["tigergraph"]
    env_file:
      - .env.production
    restart: unless-stopped
    volumes:
      - tigergraph-data:/home/tigergraph
    networks:
      - benchmark-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/echo >/dev/null || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 120s

networks:
  benchmark-internal:
    driver: bridge

volumes:
  benchmark-data:
  tigergraph-data:
